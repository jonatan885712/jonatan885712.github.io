<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito de Tequilas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d4af37; /* Gold */
            --secondary-color: #222; /* Dark Gray */
            --text-color: #333;
            --light-text-color: #666;
            --background-color: #f8f8f8;
            --card-background: #fff;
            --button-success: #28a745;
            --button-danger: #dc3545;
            --border-color: #eee;
            --shadow-light: rgba(0,0,0,0.08);
            --shadow-medium: rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: var(--background-color);
            margin: 0;
            line-height: 1.6;
            color: var(--text-color);
        }

        header {
            display: flex;
            align-items: center;
            background: var(--secondary-color);
            color: #fff;
            padding: 16px 40px;
            box-shadow: 0 4px 15px var(--shadow-medium);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            width: 70px; /* Slightly larger logo */
            margin-right: 24px;
            border-radius: 50%; /* Make logo circular */
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        nav {
            margin-left: auto;
        }

        nav a {
            color: #fff;
            margin: 0 20px;
            text-decoration: none;
            font-weight: 500; /* Slightly lighter bold */
            font-size: 1.05em;
            transition: color 0.3s ease, transform 0.2s ease;
            position: relative;
        }

        nav a:hover {
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        .container {
            max-width: 1000px; /* Wider container */
            margin: 40px auto;
            background: var(--card-background);
            border-radius: 15px; /* More rounded corners */
            box-shadow: 0 5px 20px var(--shadow-medium);
            padding: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 35px;
            font-size: 2.8em;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .productos {
            display: grid; /* Use grid for better layout control */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Responsive columns */
            gap: 30px; /* Increased gap */
            justify-content: center;
            padding: 20px 0;
        }

        .producto {
            background: #fdfcf9; /* Lighter, warmer background */
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Distribute content */
            align-items: center;
        }

        .producto:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .producto img {
            max-width: 90%; /* Slightly less wide */
            height: 180px; /* Taller images */
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 8px; /* Slight border-radius for images */
        }

        .producto h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            color: var(--secondary-color);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .producto p {
            color: var(--light-text-color);
            font-size: 0.9em;
            margin-bottom: 8px;
            flex-grow: 1; /* Allow paragraphs to take up space */
        }

        .producto .precio-actual {
            font-size: 1.25em;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: block; /* Ensure it takes full width */
        }

        .producto .cantidad-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            gap: 15px; /* Increased gap */
            margin-bottom: 15px;
        }

        .producto .cantidad-controls button {
            background: var(--button-success);
            color: white;
            border: none;
            border-radius: 50%; /* Circular buttons */
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .producto .cantidad-controls button:hover {
            background: #218838;
            transform: scale(1.1);
        }

        .producto .cantidad {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--text-color);
            min-width: 30px;
            text-align: center;
        }

        .producto .subtotal {
            font-size: 1.2em;
            font-weight: 700;
            color: #007bff; /* A distinct color for subtotal */
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed var(--border-color); /* Dashed line for subtle separation */
            width: 100%;
        }

        .producto .eliminar-btn { /* Changed to class for consistency */
            background: var(--button-danger);
            color: white;
            border: none;
            border-radius: 8px; /* Slightly more rounded */
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            margin-top: 20px; /* More space */
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .producto .eliminar-btn:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .vaciar-carrito {
            display: block;
            width: fit-content;
            margin: 30px auto; /* More margin */
            background: var(--button-danger);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 25px; /* Larger padding */
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .vaciar-carrito:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .resumen-carrito {
            text-align: right;
            margin-top: 30px; /* Margen superior ligeramente menor */
            padding-top: 20px; /* Relleno superior ligeramente menor */
            border-top: 2px solid var(--primary-color); /* Borde más grueso y de color */
            position: sticky;
            bottom: 0;
            background: var(--card-background);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            padding-bottom: 15px; /* Relleno inferior reducido */
            z-index: 900;
            box-shadow: 0 -5px 15px var(--shadow-light);
            min-height: auto; /* Asegura que se ajuste al contenido */
        }

        .resumen-carrito h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6em; /* Encabezado más pequeño */
            color: var(--secondary-color);
            margin-bottom: 10px; /* Menos margen inferior */
            letter-spacing: 0.5px;
        }

        .resumen-carrito p {
            font-size: 1.4em; /* Precio total más pequeño */
            font-weight: 700;
            color: var(--button-success);
            margin-bottom: 15px; /* Menos margen inferior */
        }

        .resumen-carrito button {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 20px; /* Relleno del botón más pequeño */
            cursor: pointer;
            font-size: 1em; /* Fuente del botón más pequeña */
            font-weight: 700;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3); /* Sombra ligeramente menor */
            margin-top: 15px; /* Menos margen superior */
        }

        .resumen-carrito button:hover {
            background: #b89a2f; /* Dorado ligeramente más oscuro */
            transform: translateY(-2px); /* Menor elevación al pasar el ratón */
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            header {
                padding: 12px 20px;
            }
            .logo {
                width: 50px;
            }
            nav a {
                margin: 0 10px;
                font-size: 1em;
            }
            .container {
                margin: 20px auto;
                padding: 25px;
            }
            h1 {
                font-size: 2.2em;
            }
            .productos {
                grid-template-columns: 1fr; /* Single column on smaller screens */
            }
            .producto {
                width: auto;
            }
            .resumen-carrito h2 {
                font-size: 1.5em; /* Ajuste para móviles */
            }
            .resumen-carrito p {
                font-size: 1.5em; /* Ajuste para móviles */
            }
            .resumen-carrito button {
                padding: 12px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="IMAGENES JOSE CUERVO/JOSE CUERVO LOGO blanco.png" alt="Logo Tequilera Jose Cuervo" class="logo">
        <nav>
            <a href="index.html">Página Principal</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="mixiologia.html">Mixología</a>
            <a href="carrito.html">Carrito</a>
            <a href="ver_pedido.html">Ver Pedido</a>
        </nav>
    </header>

    <div class="container">
        <h1>Tu Carrito</h1>
        <div id="productos-carrito" class="productos">
        </div>

        <button id="vaciar-carrito-btn" class="vaciar-carrito">Vaciar Carrito</button>

        <div class="resumen-carrito">
            <h2>Total del Carrito:</h2>
            <p id="total-carrito">$0.00</p>
            <button id="proceder-compra-btn">Proceder a la Compra</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const productosCarritoDiv = document.getElementById('productos-carrito');
            const totalCarritoSpan = document.getElementById('total-carrito');
            const vaciarCarritoBtn = document.getElementById('vaciar-carrito-btn');
            const procederCompraBtn = document.getElementById('proceder-compra-btn');

            // --- Datos de productos para referencia (los mismos que en catalogo.html) ---
            const allProducts = [
                {
                    id: 1,
                    name: 'Maestro Doble',
                    description: 'Tequila Maestro Doble de Jose Cuervo. Un tequila ultra-premium 100% de agave azul.',
                    image: "/IMAGENES JOSE CUERVO/1800.jpeg",
                    menudeo: 450.00,
                    mayoreo: 400.00,
                    botellasPorCaja: 12 // Agregado para el cálculo de mayoreo
                },
                {
                    id: 2,
                    name: 'Tequila Jose Cuervo Tradicional',
                    description: 'El tequila tradicional de Jose Cuervo, perfecto para margaritas o para tomar solo.',
                    image: "/IMAGENES JOSE CUERVO/1800.jpeg",
                    menudeo: 380.00,
                    mayoreo: 340.00,
                    botellasPorCaja: 12
                },
                {
                    id: 3,
                    name: 'Jose Cuervo Especial',
                    description: 'Tequila Jose Cuervo Especial, un clásico versátil ideal para cocteles.',
                    image: "/IMAGENES JOSE CUERVO/1800.jpeg",
                    menudeo: 320.00,
                    mayoreo: 280.00,
                    botellasPorCaja: 12
                },
                {
                    id: 4,
                    name: 'Tequila 1800',
                    description: 'Tequila 1800, 100% de agave azul, con un sabor suave y complejo.',
                    image: "/IMAGENES JOSE CUERVO/1800.jpeg",
                    menudeo: 550.00,
                    mayoreo: 500.00,
                    botellasPorCaja: 6
                },
            ];
            // --- Fin de datos de productos ---

            function obtenerCarrito() {
                return JSON.parse(localStorage.getItem('carrito')) || [];
            }

            // `guardarCarrito` es crucial: se llama después de cada cambio para
            // mantener el localStorage sincronizado.
            function guardarCarrito(carrito) {
                localStorage.setItem('carrito', JSON.stringify(carrito));
            }

            // Esta es la función de cálculo de precios, es la misma que usa compra.html
            function calcularPrecioUnitarioReal(item) {
                const productoBase = allProducts.find(p => p.id === item.id);
                if (!productoBase) return 0; // Fallback

                if (item.type === 'menudeo') {
                    return productoBase.menudeo;
                } else if (item.type === 'mayoreo') {
                    // Si el precio en el carrito ya es el unitario por botella en mayoreo, úsalo.
                    // Si no, usa el precio de mayoreo de allProducts
                    return item.price || productoBase.mayoreo; // item.price ya debería ser el precio por botella de mayoreo
                }
                return 0;
            }

            function renderizarCarrito() {
                const carrito = obtenerCarrito();
                productosCarritoDiv.innerHTML = '';
                let totalGeneral = 0;

                if (carrito.length === 0) {
                    productosCarritoDiv.innerHTML = '<p style="text-align: center; font-size: 1.2em; color: #555; padding: 30px;">El carrito está vacío. ¡Explora nuestro catálogo para encontrar tu tequila ideal!</p>';
                    totalCarritoSpan.textContent = '$0.00';
                    vaciarCarritoBtn.style.display = 'none';
                    procederCompraBtn.style.display = 'none';
                    return;
                }

                vaciarCarritoBtn.style.display = 'block';
                procederCompraBtn.style.display = 'block';

                carrito.forEach(item => {
                    const productoBase = allProducts.find(p => p.id === item.id);
                    if (!productoBase) return; // Skip if product not found in base data

                    const precioUnitario = calcularPrecioUnitarioReal(item);
                    let subtotal;
                    let tipoTexto;
                    let precioMostrado;

                    if (item.type === 'menudeo') {
                        subtotal = precioUnitario * item.quantity;
                        tipoTexto = 'Botella (Menudeo)';
                        precioMostrado = `$${precioUnitario.toFixed(2)}`;
                    } else { // Mayoreo
                        // La cantidad en el carrito es el número de cajas
                        // El precio unitario es por botella en mayoreo
                        subtotal = precioUnitario * productoBase.botellasPorCaja * item.quantity;
                        tipoTexto = `Caja (Mayoreo - ${productoBase.botellasPorCaja} botellas/caja)`;
                        precioMostrado = `$${precioUnitario.toFixed(2)} (por botella)`;
                    }
                    
                    totalGeneral += subtotal;

                    const productoDiv = document.createElement('div');
                    productoDiv.className = 'producto';
                    productoDiv.innerHTML = `
                        <img src="${item.image}" alt="${item.name}">
                        <h2>${item.name}</h2>
                        <p>Tipo: ${tipoTexto}</p>
                        <p class="precio-actual">Precio Unitario: ${precioMostrado}</p>
                        <div class="cantidad-controls">
                            <button onclick="cambiarCantidad('${item.cartItemId}', -1)">-</button>
                            <span class="cantidad">${item.quantity}</span>
                            <button onclick="cambiarCantidad('${item.cartItemId}', 1)">+</button>
                        </div>
                        <p class="subtotal">Subtotal: $${subtotal.toFixed(2)}</p>
                        <button class="eliminar-btn" onclick="eliminarDelCarrito('${item.cartItemId}')">Eliminar</button>
                    `;
                    productosCarritoDiv.appendChild(productoDiv);
                });

                // Se actualiza el total en la interfaz del carrito
                totalCarritoSpan.textContent = `$${totalGeneral.toFixed(2)}`;
            }

            window.cambiarCantidad = function(cartItemId, cambio) {
                const carrito = obtenerCarrito();
                const itemIndex = carrito.findIndex(item => item.cartItemId === cartItemId);

                if (itemIndex > -1) {
                    carrito[itemIndex].quantity += cambio;
                    if (carrito[itemIndex].quantity <= 0) {
                        carrito.splice(itemIndex, 1); // Eliminar si la cantidad es 0 o menos
                    }
                    guardarCarrito(carrito); // Aquí se actualiza el localStorage
                    renderizarCarrito(); // Volver a renderizar para actualizar
                    actualizarContadorCarritoGlobal(); // Actualizar el contador de la navbar
                }
            };

            window.eliminarDelCarrito = function(cartItemId) {
                if (!confirm('¿Estás seguro de que quieres eliminar este producto del carrito?')) {
                    return; // No hacer nada si el usuario cancela
                }
                let carrito = obtenerCarrito();
                carrito = carrito.filter(item => item.cartItemId !== cartItemId);
                guardarCarrito(carrito); // Aquí se actualiza el localStorage
                renderizarCarrito();
                actualizarContadorCarritoGlobal(); // Actualizar el contador de la navbar
            };

            vaciarCarritoBtn.addEventListener('click', function() {
                if (confirm('¿Estás seguro de que quieres vaciar el carrito? Esta acción no se puede deshacer.')) {
                    localStorage.removeItem('carrito');
                    renderizarCarrito();
                    actualizarContadorCarritoGlobal(); // Actualizar el contador de la navbar
                }
            });

            procederCompraBtn.addEventListener('click', function() {
                const carrito = obtenerCarrito();
                if (carrito.length === 0) {
                    alert('Tu carrito está vacío. Por favor, agrega productos antes de proceder a la compra.');
                    return;
                }
                // Redirige a compra.html. Los datos del carrito ya están en localStorage,
                // listos para ser leídos por la siguiente página.
                window.location.href = 'compra.html';
            });

            // Función para actualizar el contador del carrito en la navbar (replicada de catalogo.html)
            function actualizarContadorCarritoGlobal() {
                const carrito = obtenerCarrito();
                // La suma de todas las cantidades en el carrito para el badge
                const totalItems = carrito.reduce((sum, item) => sum + item.quantity, 0);
                const cartCountElement = document.getElementById('cart-count');
                if (cartCountElement) {
                   cartCountElement.textContent = carrito.length; // Cantidad de tipos de productos
                }
            }

            renderizarCarrito();
            actualizarContadorCarritoGlobal(); // Inicializar el contador al cargar la página
        });
    </script>
</body>
</html>
