<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento de Pedido</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background: linear-gradient(120deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 430px;
            margin: 50px auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 6px 32px rgba(44,62,80,0.13);
            padding: 38px 30px 30px 30px;
        }
        h2 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .input-group {
            text-align: center;
            margin-top: 20px;
        }
        label {
            font-size: 15px;
            color: #444;
            font-weight: 500;
        }
        input[type="text"] {
            padding: 10px 14px;
            font-size: 17px;
            border-radius: 7px;
            border: 1.5px solid #bdbdbd;
            width: 75%;
            margin: 14px 0 8px 0;
            outline: none;
            transition: border 0.2s;
        }
        input[type="text"]:focus {
            border: 1.5px solid #4caf50;
        }
        button, .main-btn {
            padding: 10px 28px;
            font-size: 16px;
            border-radius: 7px;
            border: none;
            background: linear-gradient(90deg, #43e97b 0%, #38f9d7 100%);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 22px;
            box-shadow: 0 2px 8px rgba(44,62,80,0.08);
            transition: background 0.2s, transform 0.1s;
        }
        button:hover, .main-btn:hover {
            background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);
            transform: translateY(-2px) scale(1.03);
        }
        .progress-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 38px 0 18px 0;
            position: relative;
        }
        .step {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }
        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 22px;
            right: -50%;
            width: 100%;
            height: 5px;
            background: #e0e0e0;
            z-index: 0;
            border-radius: 3px;
        }
        .step.active:not(:last-child)::after {
            background: linear-gradient(90deg, #43e97b 0%, #38f9d7 100%);
        }
        .circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px auto;
            font-weight: bold;
            color: #888;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(44,62,80,0.07);
            border: 3px solid #fff;
            transition: background 0.2s, color 0.2s;
        }
        .step.active .circle {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(67,233,123,0.13);
        }
        .label {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }
        .step.active .label {
            color: #11998e;
            font-weight: 700;
        }
        .hidden {
            display: none;
        }
        #estado-texto {
            text-align: center;
            margin-top: 32px;
            font-size: 17px;
            color: #333;
            font-weight: 500;
        }
        #error {
            color: #e53935;
            margin-top: 10px;
            font-size: 15px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 18px 5vw 20px 5vw;
            }
            .progress-bar {
                flex-direction: column;
                gap: 18px;
            }
            .step:not(:last-child)::after {
                width: 5px;
                height: 100%;
                top: 50%;
                left: 50%;
                right: auto;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Seguimiento de tu pedido</h2>
        <div id="input-section" class="input-group">
            <label for="codigo">Ingresa tu código de pedido:</label><br>
            <input type="text" id="codigo" placeholder="Ej: ABC123">
            <br>
            <button onclick="verificarCodigo()">Ver pedido</button>
            <div id="error"></div>
        </div>
        <div id="seguimiento-section" class="hidden">
            <div class="progress-bar" id="progress-bar">
                </div>
            <p id="estado-texto"></p>
            <a href="index.html" class="main-btn" id="btn-principal">Ir a la página principal</a>
        </div>
    </div>
    <script>
        // Estados de pedido
        const estados = [
            { label: "Preparando", texto: "Tu pedido está siendo preparado." },
            { label: "En camino", texto: "Tu pedido está en camino. ¡Ya casi llega!" },
            { label: "Entregado", texto: "¡Tu pedido ya fue entregado!" }
        ];

        function obtenerPedidosRegistrados() {
            // Recupera los pedidos de localStorage
            return JSON.parse(localStorage.getItem('pedidosRegistrados')) || {};
        }

        function verificarCodigo() {
            const codigo = document.getElementById('codigo').value.trim().toUpperCase(); // Convertir a mayúsculas
            const errorDiv = document.getElementById('error');
            const pedidos = obtenerPedidosRegistrados(); // Cargar los pedidos

            if (!codigo) {
                errorDiv.textContent = "Por favor ingresa un código.";
                return;
            }

            if (!(codigo in pedidos)) {
                errorDiv.textContent = "Código no encontrado. Intenta con otro.";
                return;
            }
            
            errorDiv.textContent = "";
            mostrarSeguimiento(pedidos[codigo]); // Usa el estado guardado para el código
        }

        function mostrarSeguimiento(estadoIndex) {
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('seguimiento-section').classList.remove('hidden');
            const progressBar = document.getElementById('progress-bar');
            progressBar.innerHTML = '';
            for (let i = 0; i < estados.length; i++) {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'step' + (i <= estadoIndex ? ' active' : '');
                stepDiv.innerHTML = `
                    <div class="circle">${i + 1}</div>
                    <div class="label">${estados[i].label}</div>
                `;
                progressBar.appendChild(stepDiv);
            }
            document.getElementById('estado-texto').textContent = estados[estadoIndex].texto;
        }
    </script>
</body>
</html>
